name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src
      - name: Pytest
        run: uv run pytest

