name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: |
          # Full strict mypy over src has legacy debt; keep CI gating the
          # settlement/modeling/weather modules that are currently maintained.
          uv run mypy \
            src/pmtmax/markets/book_utils.py \
            src/pmtmax/markets/outcome_schema.py \
            src/pmtmax/markets/rule_parser.py \
            src/pmtmax/modeling/bin_mapper.py \
            src/pmtmax/modeling/train.py \
            src/pmtmax/weather/features.py \
            src/pmtmax/weather/truth_sources/cwa.py \
            src/pmtmax/weather/truth_sources/hko.py \
            src/pmtmax/weather/truth_sources/noaa_global_hourly.py
      - name: Pytest
        run: uv run pytest

