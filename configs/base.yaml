app:
  env: research
  random_seed: 42
  supported_cities:
    - Seoul
    - NYC
    - London
    - Hong Kong
    - Taipei
    - Toronto
    - Tokyo
    - Singapore
    - Chicago
    - Atlanta
    - Miami
    - Dallas
    - Ankara
    - Wellington
    - Lucknow
    - Paris
    - Milan
    - Warsaw
    - Madrid
    - Tel Aviv
    - Buenos Aires
    - Seattle
    - Sao Paulo
    - Shanghai
    - Munich
    - Chongqing
    - Beijing
    - Wuhan
    - Chengdu
    - Shenzhen
  data_dir: data
  cache_dir: data/cache
  raw_dir: data/raw
  parquet_dir: data/parquet
  run_dir: data/runs
  archive_dir: data/archive
  manifest_dir: data/manifests
  duckdb_path: data/duckdb/warehouse.duckdb
  llm_rule_parser: false

polymarket:
  gamma_base_url: https://gamma-api.polymarket.com
  clob_base_url: https://clob.polymarket.com
  ws_market_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  refresh_interval_seconds: 300
  max_pages: 20

weather:
  openmeteo_base_url: https://api.open-meteo.com
  archive_base_url: https://historical-forecast-api.open-meteo.com
  timeout_seconds: 30
  retries: 3
  lagged_run_offsets_hours: [0, 6, 12, 24]
  models:
    - ecmwf_ifs025
    - ecmwf_ifs04
    - ecmwf_aifs025_single
    - kma_gdps
    - gfs_seamless

metar:
  base_url: https://aviationweather.gov/api/data
  enabled: true
  stale_minutes: 30

backtest:
  decision_horizons:
    - market_open
    - previous_evening
    - morning_of
  default_edge_threshold: 0.03
  min_liquidity: 250.0
  slippage_bps: 50

execution:
  fee_bps: 200
  mode: paper
  live_trading: false
  confirm_live_trading: ""
  max_city_exposure: 500.0
  global_max_exposure: 2000.0
  min_liquidity: 250.0
  max_spread_bps: 700
  stale_forecast_minutes: 180
  stop_loss_pct: 0.20
  trailing_stop_rise_pct: 0.20
  forecast_exit_buffer: 0.05

models:
  benchmark_ladder:
    - climatology
    - raw_best_model
    - raw_multimodel_average
    - gaussian_emos
    - heteroscedastic_linear
    - ts_emos
    - leadtime_continuous
    - det2prob_nn
    - pinn_postproc
    - flexible_flow_nn
    - transformer_postproc
    - spatial_gnn
    - aifs_nwp_blend

scanner:
  interval_seconds: 60
  max_cycles: 0
  state_path: artifacts/scanner_state.json
  snapshot_refresh_interval: 10

firebase:
  enabled: false
  bucket_name: ""
  prefix: pmtmax
  credentials_json: ""

monitoring:
  l2_interval_seconds: 900
  l2_settlement_window_hours: 48.0
  l2_output_dir: data/l2_timeseries

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""

market_making:
  enabled: false
  base_half_spread: 0.02
  skew_factor: 0.5
  base_size: 10.0
  requote_threshold: 0.01
  max_position_per_outcome: 100.0
  max_total_exposure: 1000.0
  max_loss: 500.0
